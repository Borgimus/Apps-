name: Session safety validation

on:
  push:
    branches:
      - agent/session-safety-hardening
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
      - name: Syntax check
        run: |
          python -m py_compile \
            app/trading/position_manager.py \
            app/trading/tradier_contract_gate.py \
            app/strategies/liquidity_filter.py \
            app/utils/logging_setup.py \
            scripts/capture_session_fingerprint.py \
            tests/test_session_safety_hardening.py
      - name: Focused tests
        run: |
          python -m pytest \
            tests/test_session_safety_hardening.py \
            tests/test_position_manager.py \
            tests/test_market_data_observer.py \
            -q -p no:warnings
      - name: Required suite
        run: |
          python -m pytest \
            tests/test_broker_interface.py \
            tests/test_strategies.py \
            tests/test_risk_manager.py \
            tests/test_paper_order_placement.py \
            tests/test_alpaca_broker.py \
            tests/test_market_hours_guard.py \
            tests/test_entry_limit_price.py \
            tests/test_position_manager.py \
            tests/test_multi_trade_guards.py \
            tests/test_session_runner.py \
            tests/test_reconciliation.py \
            tests/test_reconciler_authority.py \
            tests/test_option_quote_exit.py \
            tests/test_market_data_observer.py \
            tests/test_eod_review.py \
            tests/test_session_safety_hardening.py \
            -q -p no:warnings
