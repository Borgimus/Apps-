version: "3.9"

services:
  dashboard:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  session-runner:
    build: .
    restart: unless-stopped
    command: ["python", "scripts/session_runner.py"]
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      dashboard:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
