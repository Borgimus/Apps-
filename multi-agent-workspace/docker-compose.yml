services:
  workspace:
    build: .
    ports:
      - '3000:3000'
    environment:
      # SQLite lives on the volume below; swap for Postgres when that
      # migration path lands (see docs/limitations-roadmap.md).
      DATABASE_URL: 'file:/data/workspace.db'
      ANTHROPIC_API_KEY: '${ANTHROPIC_API_KEY:-}'
      OPENAI_API_KEY: '${OPENAI_API_KEY:-}'
      OPENAI_BASE_URL: '${OPENAI_BASE_URL:-}'
      OLLAMA_BASE_URL: '${OLLAMA_BASE_URL:-}'
    volumes:
      - workspace-data:/data
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  workspace-data:
