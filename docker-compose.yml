version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ict_trading
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d ict_trading"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://trader:${POSTGRES_PASSWORD:-changeme}@db:5432/ict_trading
      API_HOST: 0.0.0.0
      API_PORT: "8000"
      LOG_LEVEL: INFO
      # Broker credentials (set in .env file)
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
      # Alert channels (optional)
      ICT_ALERT_DISCORD_WEBHOOK: ${DISCORD_WEBHOOK:-}
      ICT_ALERT_TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-}
      ICT_ALERT_TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backtest_results:/app/backtest_results
      - logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  backtest_results:
  logs:
