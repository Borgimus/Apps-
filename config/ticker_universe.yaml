# Ticker universe for the scanning pipeline.
# yfinance is used for research/screening only.
# Alpaca remains execution source of truth.

# mode: manual | off
# manual: use the symbols list below
# off:    disable scanning; fall back to session-runner --symbol args
mode: manual

symbols:
  - SPY
  - QQQ
  - IWM
  - DIA
  - AAPL
  - MSFT
  - NVDA
  - TSLA
  - AMD
  - META
  - AMZN
  - GOOGL
  - NFLX

# Symbols always excluded regardless of score (earnings blackouts, delisted, etc.)
blacklist: []

scan_config:
  max_symbols_per_scan: 10
  max_active_symbols: 3
  max_symbols_traded_per_day: 1
  max_active_positions: 1
  min_scan_score: 40.0
  scan_interval_minutes: 30
